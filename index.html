<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Software Dept | 3D Tunnel Experience</title>
    <meta name="description" content="Wonderland Studio 스타일의 몰입형 3D 터널 포트폴리오 사이트입니다.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Subject Add Modal -->
    <div id="subject-modal" class="login-overlay hidden">
        <div class="login-card">
            <button class="close-modal" id="close-subject-modal">&times;</button>
            <div class="login-header">
                <h2 class="login-logo">ADD SUBJECT</h2>
                <p>새로운 과목을 시간표에 등록합니다.</p>
            </div>
            <div class="login-form">
                <div class="input-group">
                    <label>SUBJECT NAME</label>
                    <input type="text" id="sub-name" placeholder="과목명을 입력하세요">
                </div>
                <div class="input-row" style="display: flex; gap: 1rem;">
                    <div class="input-group" style="flex: 1;">
                        <label>DAY</label>
                        <select id="sub-day" class="custom-select">
                            <option value="MON">MON</option>
                            <option value="TUE">TUE</option>
                            <option value="WED">WED</option>
                            <option value="THU">THU</option>
                            <option value="FRI">FRI</option>
                        </select>
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label>COLOR</label>
                        <select id="sub-color" class="custom-select">
                            <option value="subject-1">Cyan</option>
                            <option value="subject-2">Red</option>
                            <option value="subject-3">Green</option>
                            <option value="subject-4">Yellow</option>
                            <option value="subject-5">Purple</option>
                            <option value="subject-6">Pink</option>
                        </select>
                    </div>
                </div>
                <div class="input-row" style="display: flex; gap: 1rem;">
                    <div class="input-group" style="flex: 1;">
                        <label>START TIME</label>
                        <select id="sub-start" class="custom-select">
                            <option value="2">09:00</option>
                            <option value="3">10:00</option>
                            <option value="4">11:00</option>
                            <option value="5">12:00</option>
                            <option value="6">13:00</option>
                            <option value="7">14:00</option>
                            <option value="8">15:00</option>
                            <option value="9">16:00</option>
                            <option value="10">17:00</option>
                        </select>
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label>END TIME</label>
                        <select id="sub-end" class="custom-select">
                            <option value="3">10:00</option>
                            <option value="4">11:00</option>
                            <option value="5">12:00</option>
                            <option value="6">13:00</option>
                            <option value="7">14:00</option>
                            <option value="8">15:00</option>
                            <option value="9">16:00</option>
                            <option value="10">17:00</option>
                            <option value="11">18:00</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer-btns" style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button id="del-sub-btn" class="main-login-btn danger hidden" style="background: #ff4757; flex: 1; margin-top: 0;">DELETE</button>
                    <button id="add-sub-confirm" class="main-login-btn" style="flex: 2; margin-top: 0;">ADD TO SCHEDULE</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="login-screen" class="login-overlay hidden">
        <div class="login-card">
            <button class="close-modal" id="close-login">&times;</button>
            <div class="login-header">
                <h2 class="login-logo">CAMPUS HUB</h2>
                <p>대학 생활의 모든 것, 한 곳에서 관리하세요.</p>
            </div>
            <div class="login-form">
                <div class="input-group">
                    <label>ID</label>
                    <input type="text" id="user-id" placeholder="아이디를 입력하세요">
                </div>
                <div class="input-group">
                    <label>PASSWORD</label>
                    <input type="password" id="user-pw" placeholder="비밀번호를 입력하세요">
                </div>
                <button id="login-btn" class="main-login-btn">ENTER SYSTEM</button>
                <div class="login-footer">
                    <span>처음이신가요?</span>
                    <a href="#" id="signup-link">계정 생성하기</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Scroll Proxy -->
    <div class="scroll-proxy" id="proxy"></div>

    <nav class="gnb">
        <div class="gnb-left">
            <a href="#" class="logo">CAMPUS HUB</a>
        </div>
        
        <div class="gnb-center">
            <div class="ticker-wrapper">
                <div class="ticker-content">
                    <span class="ticker-label">URGENT</span>
                    <span id="assignment-ticker" class="ticker-text">과제가 0개 있습니다</span>
                </div>
            </div>
        </div>

        <div class="gnb-right" id="auth-container">
            <!-- Logged out state -->
            <button id="nav-login-btn" class="nav-auth-btn">LOGIN</button>
            
            <!-- Logged in state (Hidden by default) -->
            <div id="user-profile" class="user-profile hidden">
                <div class="profile-trigger">
                    <span id="user-display-name">User</span>
                    <div class="profile-avatar"></div>
                </div>
                <div class="profile-dropdown">
                    <div class="dropdown-header">
                        <p class="user-id-tag" id="dropdown-user-id">@user_id</p>
                    </div>
                    <ul class="dropdown-menu">
                        <li><a href="#" id="go-mypage">마이페이지</a></li>
                        <li><a href="#" id="go-settings">설정</a></li>
                        <li class="divider"></li>
                        <li><a href="#" id="logout-btn">로그아웃</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <!-- Side Vertical Menu -->
    <div class="side-nav">
        <div class="side-item" data-index="0">시간표</div>
        <div class="side-item" data-index="1">학교 공지</div>
        <div class="side-item" data-index="2">일정</div>
        <div class="side-item" data-index="3">학점 관리</div>
    </div>

    <div id="restart-container" class="restart-view">
        <button id="restart-btn" class="restart-button">TOP</button>
    </div>

    <div class="viewport">
        <div class="scene" id="scene">
            <div class="tunnel-card left" data-index="0" style="--z: 0px">
                <div class="card-img-container">
                    <img src="https://images.unsplash.com/photo-1506784983877-45594efa4cbe?q=80&w=2068&auto=format&fit=crop" alt="시간표">
                </div>
                <div class="card-info">
                    <div class="card-label">ACADEMIC</div>
                    <div class="card-title">시간표</div>
                </div>
            </div>
            <div class="tunnel-card right" data-index="1" style="--z: -2500px">
                <div class="card-img-container">
                    <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=2070&auto=format&fit=crop" alt="학교 공지">
                </div>
                <div class="card-info">
                    <div class="card-label">NOTICE</div>
                    <div class="card-title">학교 공지</div>
                </div>
            </div>
            <div class="tunnel-card left" data-index="2" style="--z: -5000px">
                <div class="card-img-container">
                    <img src="https://images.unsplash.com/photo-1484480974693-6ca0a78fb36b?q=80&w=2072&auto=format&fit=crop" alt="일정">
                </div>
                <div class="card-info">
                    <div class="card-label">PLANNER</div>
                    <div class="card-title">일정</div>
                </div>
            </div>
            <div class="tunnel-card right" data-index="3" style="--z: -7500px">
                <div class="card-img-container">
                    <img src="https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?q=80&w=2070&auto=format&fit=crop" alt="학점 관리">
                </div>
                <div class="card-info">
                    <div class="card-label">GRADE</div>
                    <div class="card-title">학점 관리</div>
                </div>
            </div>
        </div>
    </div>

    <div id="overlay" class="content-overlay">
        <button id="close-overlay" class="back-btn">← RETURN</button>
        <div class="content-container" id="content-body">
            <!-- Dynamic content injected here -->
        </div>
    </div>

    <template id="tpl-section3">
        <div class="section-detail">
            <div class="timetable-header">
                <span class="detail-tag">PLANNER</span>
                <h1 class="detail-title">일정</h1>
            </div>

            <div class="planner-container">
                <!-- 왼쪽: 달력 -->
                <div class="calendar-section">
                    <div class="calendar-header">
                        <button id="prev-month">&lt;</button>
                        <h3 id="calendar-month-year">MAY 2024</h3>
                        <button id="next-month">&gt;</button>
                    </div>
                    <div class="calendar-days">
                        <span>SUN</span><span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span>
                    </div>
                    <div id="calendar-grid" class="calendar-grid">
                        <!-- Days rendered dynamically -->
                    </div>
                </div>

                <!-- 오른쪽: 투두리스트 (오리지널 복구) -->
                <div class="todo-section">
                    <div class="todo-header">
                        <div class="todo-title-row">
                        <h3>TODO LIST</h3>
                        <span id="selected-date-display" class="todo-date-tag">0514</span>
                    </div>
                    </div>
                    <div class="todo-input-group">
                        <input type="text" id="todo-input" placeholder="오늘의 할 일을 입력하세요...">
                        <button id="add-todo-btn">+</button>
                    </div>
                    <ul id="dynamic-todo-list" class="todo-list">
                        <!-- Todos rendered here -->
                    </ul>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-section1">
        <div class="section-detail">
            <div class="timetable-header">
                <span class="detail-tag">2026</span>
                <h1 class="detail-title">시간표</h1>
            </div>

            <!-- 요일별 요약 (Quick View) -->
            <div class="day-summary-container">
                <div class="section-title-flex">
                    <h3 class="inner-subtitle">DAILY SUBJECTS</h3>
                    <button class="add-btn-small" id="open-add-sub-1">+</button>
                </div>
                <div class="day-grid" id="dynamic-day-grid">
                    <!-- Dynamic rendering: MON to FRI cards -->
                    <div class="day-card" data-day="MON"><span class="day-label">MON</span><ul class="subject-list"></ul></div>
                    <div class="day-card" data-day="TUE"><span class="day-label">TUE</span><ul class="subject-list"></ul></div>
                    <div class="day-card" data-day="WED"><span class="day-label">WED</span><ul class="subject-list"></ul></div>
                    <div class="day-card" data-day="THU"><span class="day-label">THU</span><ul class="subject-list"></ul></div>
                    <div class="day-card" data-day="FRI"><span class="day-label">FRI</span><ul class="subject-list"></ul></div>
                </div>
            </div>

            <!-- 메인 시간표 그리드 -->
            <div class="main-timetable-view">
                <div class="section-title-flex">
                    <h3 class="inner-subtitle">WEEKLY SCHEDULE</h3>
                    <button class="add-btn-small" id="open-add-sub-2">+</button>
                </div>
                <div class="timetable-grid-wrapper">
                    <div class="timetable-grid">
                        <div class="time-column">
                            <div class="time-slot"></div>
                            <div class="time-slot">09:00</div>
                            <div class="time-slot">10:00</div>
                            <div class="time-slot">11:00</div>
                            <div class="time-slot">12:00</div>
                            <div class="time-slot">13:00</div>
                            <div class="time-slot">14:00</div>
                            <div class="time-slot">15:00</div>
                            <div class="time-slot">16:00</div>
                            <div class="time-slot">17:00</div>
                        </div>
                        <div class="day-column" data-day="MON"><div class="day-header">MON</div></div>
                        <div class="day-column" data-day="TUE"><div class="day-header">TUE</div></div>
                        <div class="day-column" data-day="WED"><div class="day-header">WED</div></div>
                        <div class="day-column" data-day="THU"><div class="day-header">THU</div></div>
                        <div class="day-column" data-day="FRI"><div class="day-header">FRI</div></div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-section2">
        <div class="section-detail">
            <div class="timetable-header">
                <span class="detail-tag">NOTICE</span>
                <h1 class="detail-title">학교 공지</h1>
            </div>

            <!-- 공지 카테고리 탭 -->
            <div class="notice-tabs">
                <button class="notice-tab active" data-category="univ">학교 공지</button>
                <button class="notice-tab" data-category="dept">학과 공지</button>
            </div>

            <!-- 공지사항 리스트 -->
            <div class="notice-list-container">
                <div class="notice-list-header">
                    <span class="col-cat">구분</span>
                    <span class="col-title">제목</span>
                    <span class="col-date">날짜</span>
                </div>
                <div id="dynamic-notice-list" class="notice-list">
                    <!-- Dynamic rendering -->
                </div>
                <div class="notice-more-container">
                    <button id="notice-more-btn" class="notice-more-btn">더보기 +</button>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-section4">
        <div class="section-detail">
            <div class="timetable-header">
                <span class="detail-tag">GPA TRACKER</span>
                <h1 class="detail-title">학점 관리</h1>
            </div>

            <div class="gpa-container">
                <div class="gpa-dashboard">
                    <div class="gpa-card highlight">
                        <span class="gpa-label">전체 평균 평점</span>
                        <div class="gpa-value-wrap">
                            <span id="average-gpa">0.00</span>
                            <span class="gpa-max">/ 4.5</span>
                        </div>
                    </div>
                    <div class="gpa-card">
                        <span class="gpa-label">총 취득 학점</span>
                        <span id="total-credits" class="gpa-value">0</span>
                    </div>
                </div>

                <div class="gpa-input-section">
                    <h3>성적 입력</h3>
                    <div class="gpa-form">
                        <input type="text" id="gpa-subject" placeholder="과목명">
                        <select id="gpa-credit">
                            <option value="3">3학점</option>
                            <option value="2">2학점</option>
                            <option value="1">1학점</option>
                            <option value="4">4학점</option>
                        </select>
                        <select id="gpa-grade">
                            <option value="4.5">A+</option>
                            <option value="4.0">A0</option>
                            <option value="3.5">B+</option>
                            <option value="3.0">B0</option>
                            <option value="2.5">C+</option>
                            <option value="2.0">C0</option>
                            <option value="1.5">D+</option>
                            <option value="1.0">D0</option>
                            <option value="0">F</option>
                        </select>
                        <button id="add-gpa-btn">추가</button>
                    </div>
                </div>

                <div class="gpa-list-section">
                    <h3>성적 상세 리스트</h3>
                    <div class="gpa-table-header">
                        <span>과목명</span>
                        <span>학점</span>
                        <span>성적</span>
                        <span>삭제</span>
                    </div>
                    <ul id="dynamic-gpa-list" class="gpa-list">
                        <!-- Dynamic items -->
                    </ul>
                </div>
            </div>
        </div>
    </template>



    <template id="tpl-section6">
        <h1 style="font-size: 4rem; margin-bottom: 2rem;">COMMUNITY</h1>
        <div class="board-container" style="background: rgba(255,255,255,0.05); padding: 2rem; border-radius: 20px;">
            <div class="board-header" style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                <span>실시간 게시판</span>
                <button style="background: var(--accent-color); color: black; border: none; padding: 0.5rem 1rem; border-radius: 5px; font-weight: 700;">글쓰기</button>
            </div>
            <ul id="post-list" style="list-style: none;">
                <li class="board-item" style="padding: 1rem 0; border-bottom: 1px solid rgba(255,255,255,0.1);">[공지] 2024년 상반기 로봇 경진대회 예선 안내</li>
                <li class="board-item" style="padding: 1rem 0; border-bottom: 1px solid rgba(255,255,255,0.1);">오늘의 실습실 가동 시간 공지</li>
            </ul>
        </div>
    </template>

    <!-- 마이페이지 템플릿 -->
    <template id="tpl-mypage">
        <div class="section-detail">
            <div class="timetable-header">
                <span class="detail-tag">USER PROFILE</span>
                <h1 class="detail-title">마이페이지</h1>
            </div>
            
            <div class="profile-settings-container">
                <div class="settings-group">
                    <h3>학생 정보 설정</h3>
                    <div class="settings-item">
                        <label>학과</label>
                        <input type="text" id="my-dept" value="로봇소프트웨어과" readonly>
                    </div>
                    <div class="settings-item">
                        <label>학년</label>
                        <select id="my-grade">
                            <option value="1">1학년</option>
                            <option value="2">2학년</option>
                            <option value="3">3학년</option>
                        </select>
                    </div>
                    <button id="save-profile-btn" class="save-btn">정보 업데이트</button>
                </div>

                <div class="settings-group account-info">
                    <h3>계정 정보</h3>
                    <div class="settings-item">
                        <label>아이디</label>
                        <span id="display-id" class="info-value">user_id</span>
                    </div>
                    <div class="settings-item">
                        <label>비밀번호</label>
                        <div class="pw-wrap">
                            <input type="password" id="display-pw" value="********" readonly>
                            <button id="toggle-pw-view">보이기</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- 설정 템플릿 -->
    <template id="tpl-settings">
        <div class="section-detail">
            <div class="timetable-header">
                <span class="detail-tag">PREFERENCES</span>
                <h1 class="detail-title">환경 설정</h1>
            </div>

            <div class="preferences-container">
                <div class="pref-card">
                    <div class="pref-info">
                        <h3>화면 모드</h3>
                        <p>선호하는 테마를 선택하세요.</p>
                    </div>
                    <div class="theme-toggle-group">
                        <button class="theme-btn active" data-theme="dark">DARK</button>
                        <button class="theme-btn" data-theme="light">LIGHT</button>
                    </div>
                </div>

                <div class="pref-card">
                    <div class="pref-info">
                        <h3>언어 설정</h3>
                        <p>애플리케이션의 언어를 변경합니다.</p>
                    </div>
                    <select id="lang-select" class="pref-select">
                        <option value="ko">한국어 (Korean)</option>
                        <option value="en">English (English)</option>
                    </select>
                </div>
            </div>
        </div>
    </template>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="Board.js"></script>
    <script src="app.js"></script>
</body>
</html>
